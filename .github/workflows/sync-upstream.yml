name: Sync with upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork from Probanza-ar/mcp-legal-ar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync guto21/mcp-legal-ar --source Probanza-ar/mcp-legal-ar --force
